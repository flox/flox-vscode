name: "CI"

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  pull_request:
  release:
    types:
      - published

concurrency:
  group: "ci-${{ github.ref_name }}-${{ github.event_name }}-${{ github.event.number || (github.event.pull_request.head.sha || github.sha) }}"
  cancel-in-progress: true

env:
  FLOX_DISABLE_METRICS: "true"

jobs:

  build:
    name: "Build on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    timeout-minutes: 30

    strategy:
      matrix:
        os:
          - "ubuntu-latest"
          - "macos-latest"

    outputs:
      vsixPath: ${{ steps.package.outputs.vsixPath }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

        with:
          fetch-depth: 0

      - name: "Install Flox"
        uses: flox/install-flox-action@487395e72d571d87896a602afa0f12fd7b376b77 # main


      - name: "Restore npm cache"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5

        with:
          path: |
            ~/.npm
          key: "${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}"
          restore-keys: |
            ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}-

      - name: "Install"
        uses: flox/activate-action@7065dcbe5583b7b015f07a8ebd49d7266e3053e8 # main

        with:
          command: "npm ci"

      - name: "Lint"
        uses: flox/activate-action@7065dcbe5583b7b015f07a8ebd49d7266e3053e8 # main

        with:
          command: "npm run lint"

      - name: "Build"
        uses: flox/activate-action@7065dcbe5583b7b015f07a8ebd49d7266e3053e8 # main

        with:
          command: "npm run compile"

      - name: "Test on MacOS"
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          npm run test

      - name: "Test on Linux"
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          xvfb-run -a npm test

      - name: "Package"
        id: "package"
        uses: flox/activate-action@7065dcbe5583b7b015f07a8ebd49d7266e3053e8 # main

        with:
          command: "npm run package -- --out flox-latest.vsix"

      - name: "Upload vscode extention as artifact"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7

        with:
          name: "flox-latest-${{ matrix.os }}.vsix"
          path: "flox-latest.vsix"
          retention-days: 14

  publish:
    name: "Publish VSCode "

    if: ${{ github.event_name == 'release' }}
    needs:
      - "build"

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

        with:
          fetch-depth: 0

      - name: "Install Flox"
        uses: flox/install-flox-action@487395e72d571d87896a602afa0f12fd7b376b77 # main


      - name: "Restore npm cache"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5

        with:
          path: |
            ~/.npm
          key: "${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}"
          restore-keys: |
            ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}-

      - name: "Install"
        uses: flox/activate-action@7065dcbe5583b7b015f07a8ebd49d7266e3053e8 # main

        with:
          command: "npm ci"

      - name: "Download Build Artifact"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8

        with:
          name: "flox-latest-ubuntu-latest.vsix"

      - name: "Publish to Visual Studio Marketplace"
        uses: flox/activate-action@7065dcbe5583b7b015f07a8ebd49d7266e3053e8 # main

        with:
          command: |
            vsce publish \
              --pat "${{ secrets.MANAGED_FLOX_VSCODE_AZURE_DEVOPS_TOKEN_MANAGE_MARKETPLACE }}" \
              --allow-star-activation

      - name: "Publish to Open-VSX.org"
        uses: flox/activate-action@7065dcbe5583b7b015f07a8ebd49d7266e3053e8 # main

        with:
          command: |
            ovsx publish \
              --pat "${{ secrets.MANAGED_FLOX_VSCODE_OPEN_VSX_TOKEN_MARKETPLACE }}"
